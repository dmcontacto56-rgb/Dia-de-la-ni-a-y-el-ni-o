<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Antiguo Testamento · Feliz Día del Niño 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    /* ════════════════════════════════
       BASE
    ════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #f9c820;
      --red:    #e63946;
      --blue:   #1565c0;
      --navy:   #1a237e;
      --teal:   #00bcd4;
      --purple: #7b2ff7;
      --pink:   #ff69b4;
      --green:  #2e7d32;
      --orange: #ff6f00;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a1628;
      font-family: 'Nunito', sans-serif;
      user-select: none;
    }

    /* ════════════════════════════════
       STAGE — holds everything
    ════════════════════════════════ */
    #stage {
      position: relative;
      /* Fit the poster 4:5 ratio inside the viewport */
      width:  min(430px, 90vw, calc(100vh * 0.72));
      height: min(537px, calc(90vw * 1.25), calc(100vh * 0.9));
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 0 0 3px rgba(249,200,32,.35),
                  0 0 60px rgba(249,200,32,.18),
                  0 30px 80px rgba(0,0,0,.7);
    }

    /* ── Base poster image ── */
    #poster {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 26px;
    }

    /* ── Canvas layers (drawn by JS) ── */
    .fx-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      border-radius: 26px;
    }

    /* ── Overlay canvas: top of stack ── */
    #cvTop    { z-index: 10; }
    #cvMiddle { z-index: 5;  }
    #cvBottom { z-index: 2;  }

    /* ════════════════════════════════
       CLICK-TO-PLAY OVERLAY
    ════════════════════════════════ */
    #tapOverlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,22,40,.55);
      backdrop-filter: blur(4px);
      cursor: pointer;
      border-radius: 26px;
      transition: opacity .4s;
    }
    #tapOverlay.hidden { opacity: 0; pointer-events: none; }

    .tap-ring {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: rgba(249,200,32,.15);
      border: 3px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      animation: ringpulse 1.6s ease-in-out infinite;
      box-shadow: 0 0 30px rgba(249,200,32,.4);
    }
    @keyframes ringpulse {
      0%,100% { transform: scale(1);   box-shadow: 0 0 20px rgba(249,200,32,.3); }
      50%      { transform: scale(1.1); box-shadow: 0 0 50px rgba(249,200,32,.7); }
    }
    .tap-icon { font-size: 2.6rem; margin-left: 6px; }
    .tap-label {
      margin-top: 14px;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(.85rem, 3vw, 1.1rem);
      color: var(--gold);
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0,0,0,.8);
    }

    /* ════════════════════════════════
       PLAYER BAR
    ════════════════════════════════ */
    #playerBar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 15;
      background: linear-gradient(to top, rgba(10,22,40,.97) 70%, transparent);
      padding: 10px 14px 12px;
      border-radius: 0 0 26px 26px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transform: translateY(100%);
      transition: transform .5s cubic-bezier(.2,.9,.4,1);
    }
    #playerBar.visible { transform: translateY(0); }

    /* song title */
    .song-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(.75rem, 2.5vw, .95rem);
      color: #fff;
      text-align: center;
      letter-spacing: .5px;
      opacity: .9;
    }

    /* progress */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .time {
      font-size: clamp(.6rem, 2vw, .75rem);
      color: rgba(255,255,255,.7);
      font-weight: 700;
      min-width: 32px;
      text-align: center;
    }
    input[type=range].seek {
      flex: 1;
      height: 5px;
      appearance: none;
      background: rgba(255,255,255,.2);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
      position: relative;
    }
    input[type=range].seek::-webkit-slider-thumb {
      appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px rgba(249,200,32,.8);
      cursor: pointer;
    }

    /* controls row */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn-play {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--gold);
      color: var(--navy);
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(249,200,32,.5);
      transition: transform .12s, box-shadow .12s;
    }
    .btn-play:hover { transform: scale(1.08); }
    .btn-play:active { transform: scale(.94); }

    /* eq canvas inside player */
    #cvEQ {
      flex: 1;
      height: 36px;
      border-radius: 8px;
      background: rgba(255,255,255,.05);
    }

    .vol-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .85rem;
    }
    input[type=range].vol {
      width: 64px; height: 4px;
      appearance: none;
      background: rgba(255,255,255,.2);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      accent-color: var(--teal);
    }
  </style>
</head>
<body>

<div id="stage">

  <!-- POSTER IMAGE -->
  <img id="poster" src="Antiguo_Testamento.png" alt="Antiguo Testamento – Feliz Día del Niño 2026" draggable="false"/>

  <!-- FX CANVAS LAYERS -->
  <canvas class="fx-canvas" id="cvBottom"></canvas>
  <canvas class="fx-canvas" id="cvMiddle"></canvas>
  <canvas class="fx-canvas" id="cvTop"></canvas>

  <!-- TAP TO PLAY -->
  <div id="tapOverlay">
    <div class="tap-ring"><span class="tap-icon">▶</span></div>
    <p class="tap-label">Toca para reproducir</p>
  </div>

  <!-- PLAYER BAR -->
  <div id="playerBar">
    <div class="song-title">🎵 Oración de un niño · Antiguo Testamento</div>
    <div class="progress-row">
      <span class="time" id="timeCur">0:00</span>
      <input type="range" class="seek" id="seekBar" min="0" max="1000" value="0" step="1"/>
      <span class="time" id="timeTot">-:--</span>
    </div>
    <div class="controls-row">
      <button class="btn-play" id="btnPlay">▶</button>
      <canvas id="cvEQ"></canvas>
      <div class="vol-row">🔊<input type="range" class="vol" id="volBar" min="0" max="1" step="0.02" value="0.9"/></div>
    </div>
  </div>

</div>

<audio id="audio" src="Oracion_de_un_nino.mp3" preload="auto" crossorigin="anonymous"></audio>

<script>
/* ══════════════════════════════════════════════════════════
   AUDIO + WEB AUDIO API
══════════════════════════════════════════════════════════ */
const audio    = document.getElementById('audio');
const btnPlay  = document.getElementById('btnPlay');
const seekBar  = document.getElementById('seekBar');
const volBar   = document.getElementById('volBar');
const timeCur  = document.getElementById('timeCur');
const timeTot  = document.getElementById('timeTot');
const tapOver  = document.getElementById('tapOverlay');
const playerBar= document.getElementById('playerBar');
const stage    = document.getElementById('stage');

let audioCtx, analyser, srcNode, freqData, timeData;
let isPlaying = false;

function setupAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  srcNode  = audioCtx.createMediaElementSource(audio);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.82;
  srcNode.connect(analyser);
  analyser.connect(audioCtx.destination);
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.frequencyBinCount);
}

function fmt(s) {
  if (!isFinite(s)) return '-:--';
  const m = Math.floor(s / 60);
  return m + ':' + String(Math.floor(s % 60)).padStart(2,'0');
}

function togglePlay() {
  setupAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (audio.paused) {
    audio.play();
    isPlaying = true;
    btnPlay.textContent = '⏸';
    tapOver.classList.add('hidden');
    playerBar.classList.add('visible');
  } else {
    audio.pause();
    isPlaying = false;
    btnPlay.textContent = '▶';
  }
}

tapOver.addEventListener('click', togglePlay);
btnPlay.addEventListener('click', togglePlay);

audio.addEventListener('loadedmetadata', () => { timeTot.textContent = fmt(audio.duration); });
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  timeCur.textContent = fmt(audio.currentTime);
  seekBar.value = (audio.currentTime / audio.duration) * 1000;
  // Drive progress fill via CSS
  seekBar.style.background =
    `linear-gradient(to right,#f9c820 ${(audio.currentTime/audio.duration)*100}%,rgba(255,255,255,.18) 0)`;
});
audio.addEventListener('ended', () => {
  isPlaying = false; btnPlay.textContent = '▶';
  seekBar.value = 0;
});
seekBar.addEventListener('input', () => {
  if (!audio.duration) return;
  audio.currentTime = (seekBar.value / 1000) * audio.duration;
});
volBar.addEventListener('input', () => { audio.volume = volBar.value; });
audio.volume = 0.9;

/* ══════════════════════════════════════════════════════════
   CANVAS SETUP
══════════════════════════════════════════════════════════ */
const stageEl  = document.getElementById('stage');
const cvBot    = document.getElementById('cvBottom');
const cvMid    = document.getElementById('cvMiddle');
const cvTop    = document.getElementById('cvTop');
const cvEQ     = document.getElementById('cvEQ');

let W, H;
function resize() {
  W = stageEl.clientWidth;
  H = stageEl.clientHeight;
  [cvBot, cvMid, cvTop].forEach(c => { c.width = W; c.height = H; });
  cvEQ.width  = cvEQ.clientWidth  || 200;
  cvEQ.height = cvEQ.clientHeight || 36;
}
resize();
window.addEventListener('resize', resize);

const ctxBot = cvBot.getContext('2d');
const ctxMid = cvMid.getContext('2d');
const ctxTop = cvTop.getContext('2d');
const ctxEQ  = cvEQ.getContext('2d');

/* ══════════════════════════════════════════════════════════
   PARTICLE SYSTEM
══════════════════════════════════════════════════════════ */
const PALETTE = ['#f9c820','#e63946','#1565c0','#7b2ff7','#ff69b4','#00bcd4','#43a047','#ff6f00','#fff','#00e5ff'];
const NOTE_CHARS = ['♩','♪','♫','♬','𝄞'];

class Particle {
  constructor(type) {
    this.type = type; // 'note' | 'star' | 'bubble' | 'ribbon'
    this.reset(true);
  }
  reset(cold = false) {
    this.x    = Math.random() * W;
    this.y    = cold ? Math.random() * H : H + 20;
    this.color= PALETTE[Math.floor(Math.random() * PALETTE.length)];
    this.size = this.type === 'note' ? (14 + Math.random() * 22) : (4 + Math.random() * 10);
    this.vx   = (Math.random() - .5) * 1.4;
    this.vy   = -(0.6 + Math.random() * 1.6);
    this.rot  = Math.random() * Math.PI * 2;
    this.rotV = (Math.random() - .5) * 0.06;
    this.alpha= cold ? Math.random() : 0;
    this.life = 0;
    this.maxLife = 90 + Math.random() * 120;
    this.char = NOTE_CHARS[Math.floor(Math.random() * NOTE_CHARS.length)];
    this.wobblePhase = Math.random() * Math.PI * 2;
    this.wobbleAmp = 0.3 + Math.random() * 0.8;
    this.wobbleFreq = 0.03 + Math.random() * 0.04;
    this.scaleY = 0.5 + Math.random() * 0.5; // ribbon aspect
  }
  update(energy) {
    this.life++;
    this.wobblePhase += this.wobbleFreq;
    this.x  += this.vx + Math.sin(this.wobblePhase) * this.wobbleAmp;
    this.y  += this.vy * (0.8 + energy * 1.5);
    this.rot += this.rotV;
    const p = this.life / this.maxLife;
    this.alpha = p < .15 ? p / .15 : p > .7 ? 1 - (p - .7) / .3 : 1;
    if (this.life >= this.maxLife || this.y < -40) this.reset();
  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.globalAlpha = this.alpha * .92;
    if (this.type === 'note') {
      ctx.font = `bold ${this.size}px serif`;
      ctx.fillStyle = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur  = 10;
      ctx.fillText(this.char, -this.size/2, this.size/2);
    } else if (this.type === 'star') {
      drawStar(ctx, 0, 0, 5, this.size/2, this.size/4, this.color);
    } else if (this.type === 'bubble') {
      ctx.beginPath();
      ctx.arc(0, 0, this.size/2, 0, Math.PI*2);
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 2;
      ctx.shadowColor = this.color;
      ctx.shadowBlur  = 8;
      ctx.stroke();
      ctx.fillStyle = this.color + '22';
      ctx.fill();
    } else { // ribbon
      ctx.fillStyle = this.color;
      ctx.fillRect(-this.size/2, -this.size * this.scaleY / 2, this.size, this.size * this.scaleY);
    }
    ctx.restore();
  }
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR, color) {
  let rot = (Math.PI / 2) * 3, step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur  = 12;
  ctx.fill();
}

// Pool of particles
const POOL = [
  ...Array.from({length:22}, () => new Particle('note')),
  ...Array.from({length:18}, () => new Particle('star')),
  ...Array.from({length:14}, () => new Particle('bubble')),
  ...Array.from({length:12}, () => new Particle('ribbon')),
];

/* ══════════════════════════════════════════════════════════
   RAY BURST (from centre-top, on beat)
══════════════════════════════════════════════════════════ */
const RAYS = Array.from({length:20}, (_, i) => ({
  angle: (-90 + i * (180/19)) * Math.PI/180,
  len:   0.35 + Math.random() * 0.25,
  alpha: 0,
  phase: Math.random() * Math.PI * 2,
}));

/* ══════════════════════════════════════════════════════════
   RIPPLE RINGS (beat detector)
══════════════════════════════════════════════════════════ */
const rings = [];
let lastBeat = 0;
let beatCooldown = 0;
function spawnRing(energy) {
  rings.push({ x: W/2, y: H * .38, r: 10, maxR: W * .55, alpha: .7, energy });
}

/* ══════════════════════════════════════════════════════════
   GLOW VIGNETTE
══════════════════════════════════════════════════════════ */
function drawGlow(energy) {
  const colors = [
    `rgba(249,200,32,${0.06 + energy * 0.18})`,
    `rgba(21,101,192,${0.04 + energy * 0.12})`,
  ];
  // Centre radial glow
  const g = ctxBot.createRadialGradient(W/2, H*.5, 0, W/2, H*.5, W*.65);
  g.addColorStop(0, colors[0]);
  g.addColorStop(.5, colors[1]);
  g.addColorStop(1, 'transparent');
  ctxBot.globalAlpha = 1;
  ctxBot.fillStyle = g;
  ctxBot.fillRect(0, 0, W, H);
}

/* ══════════════════════════════════════════════════════════
   EQ BAR DRAW
══════════════════════════════════════════════════════════ */
const EQ_BARS = 40;
function drawEQ(energy) {
  const ew = cvEQ.width, eh = cvEQ.height;
  ctxEQ.clearRect(0, 0, ew, eh);
  if (!analyser) {
    // idle animation
    const t = performance.now() / 600;
    for (let i = 0; i < EQ_BARS; i++) {
      const h = 4 + Math.abs(Math.sin(t + i * .4)) * 8;
      drawEQBar(ctxEQ, i, h, ew, eh, 0.35);
    }
    return;
  }
  analyser.getByteFrequencyData(freqData);
  const step = Math.floor(freqData.length / EQ_BARS);
  for (let i = 0; i < EQ_BARS; i++) {
    const v = freqData[i * step] / 255;
    const h = 3 + v * (eh - 6);
    drawEQBar(ctxEQ, i, h, ew, eh, v);
  }
}
function drawEQBar(ctx, i, h, ew, eh, v) {
  const bw = (ew / EQ_BARS) - 1;
  const x  = i * (bw + 1);
  const y  = eh - h;
  const grad = ctx.createLinearGradient(0, y, 0, eh);
  grad.addColorStop(0, `hsl(${200 + v*120},100%,60%)`);
  grad.addColorStop(1, `hsl(${200 + v*120},100%,35%)`);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(x, y, bw, h, [2,2,0,0]);
  ctx.fill();
}

/* ══════════════════════════════════════════════════════════
   WAVE WARP (waveform overlay on book area)
══════════════════════════════════════════════════════════ */
function drawWave(energy) {
  if (!analyser) return;
  analyser.getByteTimeDomainData(timeData);
  const waveY  = H * .60;
  const waveH  = H * .08;
  const waveX0 = W * .17;
  const waveW  = W * .66;
  ctxTop.save();
  ctxTop.globalAlpha = 0.45 + energy * 0.35;
  ctxTop.strokeStyle = `hsl(${210 + energy*80},100%,70%)`;
  ctxTop.lineWidth = 2.5;
  ctxTop.shadowColor = '#00e5ff';
  ctxTop.shadowBlur  = 8;
  ctxTop.beginPath();
  const sliceW = waveW / timeData.length;
  timeData.forEach((v, i) => {
    const nx = waveX0 + i * sliceW;
    const ny = waveY + ((v - 128) / 128) * waveH;
    i === 0 ? ctxTop.moveTo(nx, ny) : ctxTop.lineTo(nx, ny);
  });
  ctxTop.stroke();
  ctxTop.restore();
}

/* ══════════════════════════════════════════════════════════
   LETTER-BY-LETTER GLOW (title elements)
══════════════════════════════════════════════════════════ */
const textGlows = [
  { text:'Antiguo Testamento', x:.5, y:.1,   size:5.5, colorA:'#fff',      colorB:'#1a237e', phase:0 },
  { text:'¡Feliz día',         x:.5, y:.185, size:4.2, colorA:'#1a237e',   colorB:'#7b2ff7', phase:1.2 },
  { text:'de la niña',         x:.5, y:.25,  size:3.7, colorA:'#7b2ff7',   colorB:'#ff69b4', phase:.6 },
  { text:'y el niño!',         x:.5, y:.31,  size:3.7, colorA:'#c62828',   colorB:'#f9c820', phase:2.1 },
  { text:'Prim. Gabriela',     x:.5, y:.882, size:4,   colorA:'#f9c820',   colorB:'#ff6f00', phase:1.5 },
  { text:'Mistral',            x:.5, y:.955, size:5.5, colorA:'#e63946',   colorB:'#1565c0', phase:.9 },
  { text:'Valientes',          x:.08, y:.815,size:2.8, colorA:'#1a237e',   colorB:'#00bcd4', phase:0 },
  { text:'2026',               x:.92, y:.815,size:2.8, colorA:'#1a237e',   colorB:'#f9c820', phase:.4 },
];

function drawTextGlows(energy, t) {
  textGlows.forEach(tg => {
    const px = W * tg.x;
    const py = H * tg.y;
    const sz = W * (tg.size / 100);
    const pulse = isPlaying ? (0.5 + 0.5 * Math.sin(t/500 + tg.phase)) * energy : 0;
    if (pulse < 0.02) return;
    ctxTop.save();
    ctxTop.font = `bold ${sz}px 'Fredoka One', cursive`;
    ctxTop.textAlign = 'center';
    ctxTop.textBaseline = 'middle';
    ctxTop.shadowColor = tg.colorA;
    ctxTop.shadowBlur  = 18 + pulse * 30;
    ctxTop.globalAlpha = pulse * 0.65;
    ctxTop.fillStyle   = tg.colorA;
    ctxTop.fillText(tg.text, px, py);
    ctxTop.restore();
  });
}

/* ══════════════════════════════════════════════════════════
   MAIN RENDER LOOP
══════════════════════════════════════════════════════════ */
let energy = 0;   // smoothed 0-1
let raf;

function getEnergy() {
  if (!analyser || !isPlaying) return 0;
  analyser.getByteFrequencyData(freqData);
  const sum = freqData.reduce((a, b) => a + b, 0);
  return sum / (freqData.length * 255);
}

function loop(ts) {
  raf = requestAnimationFrame(loop);
  const rawE = getEnergy();
  energy += (rawE - energy) * 0.18; // smooth

  // Beat detection
  if (isPlaying && rawE > 0.38 && ts - lastBeat > 300) {
    lastBeat = ts;
    spawnRing(energy);
  }

  /* ── BOTTOM layer: glow + rays ── */
  ctxBot.clearRect(0, 0, W, H);
  if (isPlaying) {
    drawGlow(energy);
    // Rays
    const oCx = W * .5, oCy = H * .08;
    RAYS.forEach((r, i) => {
      r.phase += 0.025 + energy * 0.04;
      r.alpha = isPlaying ? (0.1 + 0.6 * Math.abs(Math.sin(r.phase))) * (0.4 + energy) : 0;
      const ex = oCx + Math.cos(r.angle) * W * r.len;
      const ey = oCy + Math.sin(r.angle) * H * r.len;
      const grad = ctxBot.createLinearGradient(oCx, oCy, ex, ey);
      grad.addColorStop(0, `rgba(255,255,255,${r.alpha * .9})`);
      grad.addColorStop(1, 'transparent');
      ctxBot.beginPath();
      ctxBot.moveTo(oCx, oCy);
      ctxBot.lineTo(ex, ey);
      ctxBot.strokeStyle = grad;
      ctxBot.lineWidth = 2 + energy * 4;
      ctxBot.globalAlpha = 1;
      ctxBot.stroke();
    });
  }

  /* ── MIDDLE layer: particles + rings ── */
  ctxMid.clearRect(0, 0, W, H);
  if (isPlaying) {
    // Ripple rings
    for (let i = rings.length - 1; i >= 0; i--) {
      const rg = rings[i];
      rg.r    += 4 + rg.energy * 8;
      rg.alpha -= 0.018;
      if (rg.alpha <= 0) { rings.splice(i, 1); continue; }
      ctxMid.beginPath();
      ctxMid.arc(rg.x, rg.y, rg.r, 0, Math.PI*2);
      ctxMid.strokeStyle = `rgba(249,200,32,${rg.alpha})`;
      ctxMid.lineWidth = 2.5;
      ctxMid.shadowColor = '#f9c820';
      ctxMid.shadowBlur  = 12;
      ctxMid.stroke();
    }
    // Particles
    POOL.forEach(p => { p.update(energy); p.draw(ctxMid); });
  }

  /* ── TOP layer: wave + text glows ── */
  ctxTop.clearRect(0, 0, W, H);
  if (isPlaying) {
    drawWave(energy);
    drawTextGlows(energy, ts);
  }

  /* ── EQ ── */
  drawEQ(energy);
}

loop(0);

/* ══════════════════════════════════════════════════════════
   INTERACTIVE: click poster to toggle, touch support
══════════════════════════════════════════════════════════ */
stage.addEventListener('click', e => {
  // Only toggle if clicking on the stage but not the player bar / seek
  if (e.target.closest('#playerBar') || e.target.closest('#tapOverlay')) return;
  togglePlay();
});
</script>
</body>
